<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Ган-Эрдэнэ — Digital Architect</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Mono:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030508;
  --text: #ffffff;
  --muted: #94a3b8;
  --cyan: #00fff0;
  --pink: #ff00c3;
  --border: rgba(255, 255, 255, 0.08);
  --glass: rgba(255, 255, 255, 0.02);
}

* { box-sizing: border-box; cursor: none; } /* Custom cursor-той тул үндсэн курсорыг нуулаа */

body {
  margin: 0; background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif; overflow-x: hidden;
}

/* Background Эффектүүд */
.bg-vignette {
  position: fixed; inset: 0; z-index: -1;
  background: 
    radial-gradient(circle at 0% 0%, rgba(0, 255, 240, 0.05) 0%, transparent 40%),
    radial-gradient(circle at 100% 100%, rgba(255, 0, 195, 0.05) 0%, transparent 40%);
}

/* Custom Cursor */
.cursor {
  width: 20px; height: 20px; border: 1px solid var(--cyan);
  border-radius: 50%; position: fixed; pointer-events: none;
  z-index: 9999; transition: transform 0.1s ease;
  box-shadow: 0 0 15px var(--cyan);
}

/* NAV */
nav {
  position: fixed; top: 0; width: 100%; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 4rem; backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.logo { font-family: 'Syne'; font-size: 1.4rem; letter-spacing: -2px; }
.logo span { color: var(--cyan); }

/* HERO */
.hero {
  height: 100vh; display: flex; flex-direction: column; 
  justify-content: center; align-items: center; text-align: center;
  padding-top: 80px;
}

.hero-tag {
  font-family: 'Space Mono'; font-size: 0.7rem; letter-spacing: 5px;
  color: var(--cyan); margin-bottom: 1rem; text-transform: uppercase;
}

h1 {
  font-family: 'Syne'; font-size: clamp(4rem, 15vw, 10rem);
  line-height: 0.85; margin: 0; letter-spacing: -6px;
  background: linear-gradient(to bottom, #fff 40%, #555);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.hero-sub {
  margin-top: 2rem; max-width: 500px; color: var(--muted);
  line-height: 1.6; font-weight: 300;
}

/* GLASS CARD */
.skills-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 2rem; padding: 5% 10%;
}
.glass-card {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: 24px; padding: 2.5rem; position: relative;
  overflow: hidden; transition: 0.5s; backdrop-filter: blur(10px);
}
.glass-card:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: var(--cyan); transform: translateY(-10px);
}
.glass-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
}

/* CTA BUTTON */
.cta-wrap { margin-top: 3rem; position: relative; }
.cta-btn {
  padding: 1.2rem 3rem; background: #fff; color: #000;
  font-family: 'Syne'; font-weight: 800; text-decoration: none;
  border-radius: 100px; transition: 0.3s; display: inline-block;
}
.cta-btn:hover { background: var(--cyan); transform: scale(1.05); box-shadow: 0 0 30px var(--cyan); }

/* FOOTER TICKER */
.ticker {
  position: fixed; bottom: 0; width: 100%; 
  background: rgba(0,0,0,0.8); border-top: 1px solid var(--border);
  padding: 0.8rem 0; font-family: 'Space Mono'; font-size: 0.65rem;
}

@media (max-width: 768px) {
  nav { padding: 1rem 2rem; }
  h1 { letter-spacing: -3px; }
  .cursor { display: none; }
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="bg-vignette"></div>

<nav>
  <div class="logo">G<span>.</span>ERDENE</div>
  <div class="lang-toggle" style="display: flex; gap: 10px;">
    <button onclick="setLang('mn')" style="background:none; color:#fff; border:1px solid #333; border-radius:5px; cursor:pointer;">MN</button>
    <button onclick="setLang('en')" style="background:none; color:#fff; border:1px solid #333; border-radius:5px; cursor:pointer;">EN</button>
  </div>
</nav>

<section class="hero">
  <div class="hero-tag" data-mn="ДИЖИТАЛ АРХИТЕКТОР" data-en="DIGITAL ARCHITECT">ДИЖИТАЛ АРХИТЕКТОР</div>
  <h1 id="mainTitle">CREATING<br><span style="color:var(--cyan); -webkit-text-fill-color: var(--cyan);">FUTURE</span></h1>
  <p class="hero-sub" data-mn="Програм хангамж, Forex AI болон Механик инженерчлэлийн нэгдэл." data-en="The intersection of Software, Forex AI, and Mechanical Engineering.">
    Програм хангамж, Forex AI болон Механик инженерчлэлийн нэгдэл.
  </p>
  
  <div class="cta-wrap">
    <a href="#contact" class="cta-btn" data-mn="ХАМТАРЧ АЖИЛЛАХ" data-en="LET'S COLLABORATE">ХАМТАРЧ АЖИЛЛАХ</a>
  </div>
</section>

<div class="skills-grid">
  <div class="glass-card">
    <h3 style="color:var(--cyan)">01. Dev</h3>
    <p style="font-size:0.9rem; color:var(--muted)">Full-stack applications with high-end UI/UX.</p>
  </div>
  <div class="glass-card">
    <h3 style="color:var(--pink)">02. AI</h3>
    <p style="font-size:0.9rem; color:var(--muted)">Algorithmic trading systems and deep learning.</p>
  </div>
  <div class="glass-card">
    <h3 style="color:#fff">03. Moto</h3>
    <p style="font-size:0.9rem; color:var(--muted)">Precision mechanics and Zweirad technology.</p>
  </div>
</div>

<script>
// CURSOR EFFECT
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', (e) => {
  cursor.style.left = e.clientX - 10 + 'px';
  cursor.style.top = e.clientY - 10 + 'px';
});

// LANGUAGE SYSTEM
function setLang(lang) {
  document.querySelectorAll('[data-mn]').forEach(el => {
    el.textContent = el.getAttribute(`data-${lang}`);
  });
  
  const title = document.getElementById('mainTitle');
  if(lang === 'en') {
    title.innerHTML = 'CREATING<br><span style="color:var(--cyan); -webkit-text-fill-color: var(--cyan);">FUTURE</span>';
  } else {
    title.innerHTML = 'ИРЭЭДҮЙГ<br><span style="color:var(--cyan); -webkit-text-fill-color: var(--cyan);">БҮТЭЭХ</span>';
  }
}

// HOVER EFFECT ON CARDS
document.querySelectorAll('.glass-card').forEach(card => {
  card.onmousemove = e => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    card.style.setProperty('--mouse-x', `${x}px`);
    card.style.setProperty('--mouse-y', `${y}px`);
  };
});
</script>

</body>
</html>
